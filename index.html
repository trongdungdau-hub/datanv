<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>Nộp hồ sơ nhân sự</title>
<style>
body{font-family:Arial;background:#f4f7f6;margin:0} .wrap{max-width:800px;margin:20px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1)} h2{color:#0056b3;text-align:center} .grid{display:grid;grid-template-columns:1fr 1fr;gap:15px} label{font-size:13px;font-weight:bold;display:block;margin-bottom:5px;color:#333} input,select{width:100%;padding:10px;border:1px solid #ccc;border-radius:5px;box-sizing:border-box} .section{margin-top:20px;border-top:2px solid #0056b3;padding-top:15px} .btn{background:#16a34a;color:#fff;border:none;padding:12px 20px;border-radius:5px;cursor:pointer;font-weight:bold;width:100%;font-size:16px;margin-top:20px} .d-none{display:none;} #status{margin-top:15px;padding:10px;background:#fff3cd;font-weight:bold;display:none;color:#856404;border-radius:5px}
</style>
</head><body>
<div class="wrap"><h2>📝 FORM NỘP HỒ SƠ</h2>
<div id="status"></div>
<div class="section"><h3>1. CÁ NHÂN</h3><div class="grid">
    <div><label>Họ Tên (Viết Hoa) [0]</label><input id="c0"></div><div><label>Học lực [1]</label><input id="c1"></div>
    <div><label>Nơi sinh [2]</label><input id="c2"></div><div><label>Ngày sinh [3]</label><input id="c3" type="date"></div>
    <div><label>Giới tính [4]</label><select id="c4"><option>Nam</option><option>Nữ</option></select></div>
    <div><label>Tình trạng hôn nhân [17]</label><select id="c17"><option>Chưa kết hôn</option><option>Đã kết hôn</option></select></div>
    <div><label>CCCD [19]</label><input id="c19"></div><div><label>Ngày cấp CCCD [20]</label><input id="c20" type="date"></div>
    <div><label>Số ĐT [21]</label><input id="c21"></div><div><label>Email [31]</label><input id="c31"></div>
    <div style="grid-column: span 2"><label>Địa chỉ Thường trú [18]</label><input id="c18"></div>
    <div><label>Nơi ở hiện tại [37]</label><select id="c37"><option>Thường trú</option><option>Tạm trú</option></select></div>
    <div style="grid-column: span 2"><label>Địa chỉ Tạm trú [38]</label><input id="c38"></div>
</div></div>

<div class="section"><h3>2. CÔNG VIỆC & LƯƠNG</h3><div class="grid">
    <div><label>Ngày vào làm [5]</label><input id="c5" type="date"></div><div><label>Bộ phận [6]</label><input id="c6"></div>
    <div><label>Chức vụ [7]</label><input id="c7"></div><div><label>Mức lương [9]</label><input id="c9" placeholder="VD: 5000000 hoặc 500 USD"></div>
    <div><label>Lương sau thử việc [12]</label><input id="c12"></div><div><label>Ngân hàng [15]</label><input id="c15"></div>
    <div><label>Số TK [16]</label><input id="c16"></div>
</div></div>

<div class="section"><h3>3. HỌC VẤN</h3>
    <label>Trình độ cao nhất? [29]</label>
    <select id="c29" onchange="toggleHocVan()">
        <option value="Chưa từng đi học">Chưa từng đi học</option><option value="Tiểu học">Cấp 1 (Tiểu học)</option>
        <option value="THCS">Cấp 2 (THCS)</option><option value="THPT">Cấp 3 (THPT)</option><option value="Cao đẳng / Đại học">Cao đẳng / Đại học</option>
    </select>
    <div id="hv_1" class="d-none grid" style="margin-top:10px"><div><label>TG Tiểu Học [25]</label><input id="tg25" placeholder="2000-2005"></div><div><label>Trường [25]</label><input id="tr25"></div></div>
    <div id="hv_2" class="d-none grid" style="margin-top:10px"><div><label>TG THCS [26]</label><input id="tg26" placeholder="2005-2009"></div><div><label>Trường [26]</label><input id="tr26"></div></div>
    <div id="hv_3" class="d-none grid" style="margin-top:10px"><div><label>TG THPT [27]</label><input id="tg27" placeholder="2009-2012"></div><div><label>Trường [27]</label><input id="tr27"></div></div>
    <div id="hv_4" class="d-none grid" style="margin-top:10px"><div><label>TG CĐ/ĐH [30]</label><input id="tg30" placeholder="2012-2016"></div><div><label>Trường [30]</label><input id="tr30"></div></div>
</div>

<div class="section"><h3>4. THÔNG TIN KHÁC</h3><div class="grid">
    <div><label>Liên hệ Khẩn cấp (Tên) [22]</label><input id="c22"></div><div><label>SĐT Khẩn cấp [23]</label><input id="c23"></div>
    <div style="grid-column: span 2"><label>Địa chỉ Khẩn cấp [24]</label><input id="c24"></div>
    <div><label>Đã có BHXH chưa? [32]</label><select id="c32"><option>Chưa</option><option>Rồi</option></select></div><div><label>Số BHXH [33]</label><input id="c33"></div>
    <div><label>Đã có MST chưa? [34]</label><select id="c34"><option>Chưa</option><option>Rồi</option></select></div><div><label>Mã số thuế [35]</label><input id="c35"></div>
    <div><label>Có phải Chủ hộ? [39]</label><select id="c39"><option>Không</option><option>Có</option></select></div><div><label>Tên Chủ hộ [40]</label><input id="c40"></div>
    <div><label>Ngày sinh Chủ hộ [41]</label><input id="c41" type="date"></div><div><label>Giới tính [42]</label><select id="c42"><option>Nam</option><option>Nữ</option></select></div>
    <div><label>CCCD Chủ hộ [44]</label><input id="c44"></div>
    <div style="grid-column: span 2"><label>Địa chỉ Chủ hộ [43]</label><input id="c43"></div>
</div></div>

<div class="section"><h3>5. HÌNH ẢNH YÊU CẦU</h3><div class="grid">
    <div><label>Ảnh 4x6 [45]</label><input id="f45" type="file" accept="image/*"></div>
    <div><label>CCCD Mặt TRƯỚC [46]</label><input id="f46" type="file" accept="image/*"></div>
    <div><label>CCCD Mặt SAU [47]</label><input id="f47" type="file" accept="image/*"></div>
    <div><label>STK Ngân hàng [48]</label><input id="f48" type="file" accept="image/*"></div>
    <div><label>Sổ BHXH [49]</label><input id="f49" type="file" accept="image/*"></div>
</div></div>
<button class="btn" onclick="submitData()">🚀 GỬI HỒ SƠ</button>
</div>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWaVZbc24TCQHZoowqhW9tTEf5gtewczPfLMYrKMqDKLfjT9C3jUPYsQyXdNpCRleA/exec";
const $ = id => document.getElementById(id);

function toggleHocVan(){
    let v = $("c29").value;
    $("hv_1").className = ["Tiểu học","THCS","THPT","Cao đẳng / Đại học"].includes(v) ? "grid" : "d-none";
    $("hv_2").className = ["THCS","THPT","Cao đẳng / Đại học"].includes(v) ? "grid" : "d-none";
    $("hv_3").className = ["THPT","Cao đẳng / Đại học"].includes(v) ? "grid" : "d-none";
    $("hv_4").className = (v==="Cao đẳng / Đại học") ? "grid" : "d-none";
}
async function toBase64(file){
    if(!file) return "";
    return new Promise(r => { let reader = new FileReader(); reader.onload = e => { let img = new Image(); img.onload = () => { let cvs = document.createElement("canvas"); let max=1000; let w=img.width, h=img.height; if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}} cvs.width=w; cvs.height=h; cvs.getContext("2d").drawImage(img,0,0,w,h); r(cvs.toDataURL("image/jpeg",0.7)); }; img.src = e.target.result; }; reader.readAsDataURL(file); });
}

async function submitData(){
    $("status").style.display="block"; $("status").innerText="⏳ Đang nén ảnh và gửi dữ liệu...";
    let p = {};
    for(let i=0; i<=44; i++){
        if([8,10,11,13,14,36].includes(i)) continue; // Bỏ qua các ô không dùng
        if([25,26,27,30].includes(i)){
            let tg=$("tg"+i)?.value, tr=$("tr"+i)?.value;
            p["col"+i] = (tg||tr) ? `${tg}|${tr}` : "";
        } else {
            p["col"+i] = $("c"+i) ? $("c"+i).value : "";
        }
    }
    p.images = { anh46: await toBase64($("f45").files[0]), cccdTruoc: await toBase64($("f46").files[0]), cccdSau: await toBase64($("f47").files[0]), stk: await toBase64($("f48").files[0]), bhxh: await toBase64($("f49").files[0]) };
    try {
        await fetch(SCRIPT_URL+"?action=submit", { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify(p) });
        $("status").innerText="🎉 THÀNH CÔNG! Đã gửi hồ sơ."; setTimeout(()=>location.reload(), 2000);
    } catch(e){ $("status").innerText="❌ Lỗi: "+e; }
}
</script></body></html>
