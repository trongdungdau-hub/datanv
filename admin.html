<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị Nhân Sự - Xuất PDF (Bản Hoàn Chỉnh Tuyệt Đối)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/downloadjs/1.4.8/download.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 1200px; background: white; padding: 20px; border-radius: 8px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; text-align: center; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px;}
        th { background-color: #0056b3; color: white; }
        .btn-export { background-color: #d9534f; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-export:hover { background-color: #c9302c; }
        .btn-reload { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 10px;}
        #status { color: #155724; font-weight: bold; margin-top: 15px; white-space: pre-wrap; background: #d4edda; padding: 15px; border-radius: 5px; display: none; line-height: 1.6; border: 1px solid #c3e6cb;}
        .error-log { color: #721c24; background: #f8d7da; padding: 2px 5px; border-radius: 3px;}
    </style>
</head>
<body>

<div class="container">
    <h2>HỆ THỐNG QUẢN TRỊ - XUẤT HỒ SƠ PDF</h2>
    <button class="btn-reload" onclick="loadData()">🔄 Tải Lại Dữ Liệu Bảng Tính</button>
    <div id="status"></div>
    <table>
        <thead>
            <tr>
                <th>Ngày nộp</th>
                <th>Họ Tên</th>
                <th>Nơi sinh</th>
                <th>CCCD</th>
                <th>SĐT</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center;">Bấm "Tải Lại Dữ Liệu" để hiển thị...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWaVZbc24TCQHZoowqhW9tTEf5gtewczPfLMYrKMqDKLfjT9C3jUPYsQyXdNpCRleA/exec";
    const PDF_TEMPLATE_URL = "template.pdf"; 
    const FONT_URL = "https://cdnjs.cloudflare.com/ajax/libs/ink/3.1.10/fonts/Roboto/roboto-regular-webfont.ttf";

    let employeesData = [];

    // HÀM LẤY ẢNH "THẦN THÁNH" (Tự chuyển ảnh iPhone HEIC sang JPG, chặn đứng web rác)
    async function fetchImageBytes(driveUrl, logElement) {
        if (!driveUrl) return null;
        let match = driveUrl.match(/id=([a-zA-Z0-9_-]+)/) || driveUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
        if (!match) return null;
        let id = match[1];

        // Ép Google tạo ra một bản JPG chuẩn mượt mà
        let targetUrl = `https://drive.google.com/thumbnail?id=${id}&sz=w1000`;

        let urls = [
            targetUrl, 
            `https://api.allorigins.win/raw?url=` + encodeURIComponent(targetUrl),
            `https://corsproxy.io/?` + encodeURIComponent(targetUrl)
        ];

        for (let url of urls) {
            try {
                // Hẹn giờ 10 giây. Đứa nào nghẽn mạng -> Chém ngay lập tức, không cho treo máy!
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                let res = await fetch(url, { signal: controller.signal });
                clearTimeout(timeoutId);

                if (res.ok) {
                    let blob = await res.blob();
                    let arrayBuffer = await blob.arrayBuffer();
                    let arr = new Uint8Array(arrayBuffer);
                    
                    // Quét mã nhị phân: Bắt buộc phải là JPG (FF D8) hoặc PNG (89 50) mới nhận
                    if ((arr[0] === 255 && arr[1] === 216) || (arr[0] === 137 && arr[1] === 80)) {
                        return arrayBuffer; 
                    }
                }
            } catch (e) {
                // Lỗi mạng thì âm thầm nhảy sang link dự phòng, không treo
            }
        }
        return null; // Trả về null nếu thử mọi cách đều thất bại
    }

    function toText(value) {
        if (value === null || value === undefined) return "";
        return String(value).trim();
    }

    function formatDate(dateStr) {
        if (!dateStr) return "";
        let d = new Date(dateStr);
        if (isNaN(d.getTime())) return toText(dateStr); 
        let day = ("0" + d.getDate()).slice(-2);
        let month = ("0" + (d.getMonth() + 1)).slice(-2);
        return `${day}/${month}/${d.getFullYear()}`;
    }

    async function loadData() {
        let st = document.getElementById('status');
        st.style.display = 'block';
        st.innerText = "⏳ Đang tải dữ liệu...";
        try {
            let res = await fetch(SCRIPT_URL);
            employeesData = await res.json();
            renderTable();
            st.innerText = "✅ Tải dữ liệu thành công!";
            setTimeout(() => { st.style.display = 'none'; }, 2000);
        } catch (e) {
            st.innerText = "❌ Lỗi kết nối: " + e;
        }
    }

    function renderTable() {
        let html = '';
        employeesData.slice().reverse().forEach((emp, revIndex) => {
            let actualIndex = employeesData.length - 1 - revIndex; 
            if (!emp[0]) return; 
            html += `<tr>
                <td>${formatDate(emp[48])}</td>
                <td><b>${toText(emp[0])}</b></td>
                <td>${toText(emp[2])}</td> 
                <td>${toText(emp[19])}</td>
                <td>${toText(emp[21])}</td>
                <td><button class="btn-export" onclick="generatePDF(${actualIndex})">📄 XUẤT PDF</button></td>
            </tr>`;
        });
        document.getElementById('tableBody').innerHTML = html || '<tr><td colspan="6">Chưa có dữ liệu.</td></tr>';
    }

    function fillField(form, fieldName, value, customFont) {
        try {
            const field = form.getTextField(fieldName);
            if (field && value) {
                field.setText(value);
                field.updateAppearances(customFont);
            }
        } catch (e) {}
    }

    // HÀM IN ẢNH VÀ PHÁ HỦY KHUNG TRẮNG (Xóa màn che mắt)
    async function stampImage(form, pdfDoc, fieldName, driveUrl, pageIndex, tenAnh) {
        let st = document.getElementById('status');
        if (!driveUrl || driveUrl.toString().trim() === "") {
            st.innerHTML += `<br>⚠️ Bỏ qua [${tenAnh}]: Không có dữ liệu ảnh.`;
            return;
        }
        try {
            const field = form.getField(fieldName);
            if (!field) {
                st.innerHTML += `<br>❌ Không tìm thấy ô [${fieldName}] trong file PDF mẫu.`;
                return;
            }

            const widgets = field.acroField.getWidgets();
            if (!widgets || widgets.length === 0) return;
            const rect = widgets[0].getRectangle();

            st.innerHTML += `<br>⏳ Đang nhúng [${tenAnh}]...`;
            
            const imgBytes = await fetchImageBytes(driveUrl, st);
            if (imgBytes) {
                let img;
                try { img = await pdfDoc.embedJpg(imgBytes); }
                catch(e) {
                    try { img = await pdfDoc.embedPng(imgBytes); }
                    catch(e2) { st.innerHTML += ` <span class="error-log">❌ Lỗi định dạng ảnh.</span>`; return; }
                }

                // Tiêu diệt khung nền trắng của PDF
                form.removeField(fieldName);

                // In ảnh đè lên
                const page = pdfDoc.getPages()[pageIndex];
                page.drawImage(img, { x: rect.x, y: rect.y, width: rect.width, height: rect.height });
                
                st.innerHTML += ` <b>✅ THÀNH CÔNG! Đã in ảnh lọt khung.</b>`;
            } else {
                st.innerHTML += ` <span class="error-log">❌ Thất bại: Không lấy được ảnh hợp lệ.</span>`;
            }
        } catch (e) { 
            st.innerHTML += ` <span class="error-log">❌ Lỗi xử lý PDF.</span>`;
        }
    }

    async function generatePDF(index) {
        const emp = employeesData[index]; 
        const hoTen = toText(emp[0]) || 'NhanVien';
        
        let st = document.getElementById('status');
        st.style.display = 'block';
        st.innerHTML = `🔄 <b>ĐANG XỬ LÝ HỒ SƠ CHO [${hoTen}]...</b><br>-------------------------------------------------`;

        try {
            // Thêm '?v=thoi_gian' để ép trình duyệt không bao giờ xài lại file cũ
            const existingPdfBytes = await fetch(PDF_TEMPLATE_URL + "?v=" + new Date().getTime()).then(res => res.arrayBuffer());
            const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
            
            pdfDoc.registerFontkit(window.fontkit);
            const fontBytes = await fetch(FONT_URL).then(res => res.arrayBuffer());
            const customFont = await pdfDoc.embedFont(fontBytes);

            const form = pdfDoc.getForm();

            // 1. ĐIỀN CHỮ
            fillField(form, 'Họ Tên', emp[0], customFont);
            fillField(form, 'MSNV', emp[2], customFont); 
            fillField(form, 'Học Lực', emp[1], customFont);
            fillField(form, 'Nơi Sinh', emp[5], customFont);
            fillField(form, 'Ngày sinh', formatDate(emp[3]), customFont);
            fillField(form, 'Ngày_sinh', formatDate(emp[3]), customFont); 
            fillField(form, 'Ngày vào làm', formatDate(emp[10]), customFont);
            fillField(form, 'Bộ phận', emp[6], customFont);
            fillField(form, 'Vị trí', emp[7], customFont); 
            fillField(form, 'Mức lương căn bản', emp[9], customFont);
            fillField(form, 'Tỉnh', emp[18], customFont);
            fillField(form, 'CCCD', emp[19], customFont);
            fillField(form, 'Ngày cấp CCCD', formatDate(emp[20]), customFont);
            fillField(form, 'SDT', emp[21], customFont);
            fillField(form, 'Ngành nghề', emp[29], customFont);
            fillField(form, 'Đại học', emp[30], customFont); 

            // TICK GIỚI TÍNH
            try {
                let gioiTinh = toText(emp[4]).toLowerCase();
                if (gioiTinh === 'nam') form.getCheckBox('Nam').check();
                if (gioiTinh === 'nữ') form.getCheckBox('Nữ').check();
            } catch(e) {}

            // 2. ĐIỀN ẢNH (Tự động xóa nền trắng, chống méo ảnh)
            await stampImage(form, pdfDoc, 'Ảnh cá nhân_af_image', emp[44], 2, 'Ảnh thẻ 4x6'); 
            await stampImage(form, pdfDoc, 'Ảnh STK _af_image', emp[46], 1, 'Ảnh Thẻ Ngân hàng');    
            await stampImage(form, pdfDoc, 'Ảnh SoBHXH_af_image', emp[47], 1, 'Ảnh Sổ BHXH');  
            await stampImage(form, pdfDoc, 'CCCC_ANH_1_af_image', emp[45], 3, 'Ảnh CCCD Mặt trước');  

            // Khóa PDF
            form.flatten();

            const pdfBytes = await pdfDoc.save();
            download(pdfBytes, `HoSo_${hoTen}.pdf`, "application/pdf");
            
            st.innerHTML += `<br>-------------------------------------------------<br>🎉 <b>HOÀN TẤT! File PDF đã tải về máy tính.</b>`;
            
        } catch (err) {
            console.error(err);
            st.innerHTML += `<br><span class="error-log">❌ Lỗi hệ thống: ` + err.message + `</span>`;
        }
    }
    window.onload = loadData;
</script>
</body>
</html>
