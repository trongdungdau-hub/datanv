<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Nhân Sự - Xuất PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/downloadjs/1.4.8/download.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 1200px; background: white; padding: 20px; border-radius: 8px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; text-align: center; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px;}
        th { background-color: #0056b3; color: white; }
        .btn-export { background-color: #d9534f; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-export:hover { background-color: #c9302c; }
        .btn-reload { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>HỆ THỐNG QUẢN TRỊ - XUẤT HỒ SƠ PDF</h2>
    <button class="btn-reload" onclick="loadData()">🔄 Tải Lại Dữ Liệu Từ Bảng Tính</button>
    <div id="status" style="color: blue; font-style: italic; margin-top: 10px; font-weight: bold;"></div>
    
    <table>
        <thead>
            <tr>
                <th>Ngày điền</th>
                <th>Họ Tên</th>
                <th>Số hiệu</th>
                <th>SĐT</th>
                <th>CCCD</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center;">Bấm "Tải Lại Dữ Liệu" để hiển thị danh sách...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // Link API của bạn
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxQnBbHiUV-6WmMc9Jbq63SleYEZox6ROo3gYmN4lXXLPHV0GCGEqKxfa4sJxRszC_/exec";
    
    // Tên file PDF mẫu (Phải viết đúng in hoa/thường, không có dấu cách)
    const PDF_TEMPLATE_URL = "template.pdf"; 

    // Font tiếng Việt
    const FONT_URL = "https://cdnjs.cloudflare.com/ajax/libs/ink/3.1.10/fonts/Roboto/roboto-regular-webfont.ttf";

    let employeesData = [];

    // Hàm lấy link ảnh trực tiếp từ Google Drive (Bypass CORS)
    function getDirectImageUrl(driveUrl) {
        if (!driveUrl) return null;
        let match = driveUrl.match(/\/d\/(.+?)\//) || driveUrl.match(/id=(.+?)(&|$)/);
        if (match && match[1]) {
            // Dùng proxy để tránh bị Google Drive chặn tải ảnh trong JS
            return `https://corsproxy.io/?` + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${match[1]}`);
        }
        return null;
    }

    async function loadData() {
        document.getElementById('status').innerText = "Đang tải dữ liệu từ Google Sheets, vui lòng đợi...";
        try {
            let res = await fetch(SCRIPT_URL);
            employeesData = await res.json();
            renderTable();
            document.getElementById('status').innerText = "✅ Tải dữ liệu thành công!";
        } catch (e) {
            document.getElementById('status').innerText = "❌ Lỗi kết nối: " + e;
        }
    }

    function renderTable() {
        let html = '';
        employeesData.slice().reverse().forEach((empObj, revIndex) => {
            let actualIndex = employeesData.length - 1 - revIndex; 
            
            // Ép dữ liệu thành Mảng để gọi theo Số thứ tự cột (Chống lỗi sai tên tiêu đề)
            let emp = Object.values(empObj);
            
            // Bỏ qua nếu dòng đó trống không có Họ Tên
            if (!emp[0]) return;

            html += `<tr>
                <td>${emp[48] || ''}</td>
                <td><b>${emp[0] || ''}</b></td>
                <td>${emp[2] || ''}</td>
                <td>${emp[21] || ''}</td>
                <td>${emp[19] || ''}</td>
                <td><button class="btn-export" onclick="generatePDF(${actualIndex})">📄 XUẤT PDF</button></td>
            </tr>`;
        });
        document.getElementById('tableBody').innerHTML = html || '<tr><td colspan="6">Chưa có dữ liệu.</td></tr>';
    }

    async function generatePDF(index) {
        const empObj = employeesData[index];
        const emp = Object.values(empObj); // Lấy mảng dữ liệu của nhân viên
        const hoTen = emp[0] || 'NhanVien';

        document.getElementById('status').innerText = `Đang xử lý PDF cho [${hoTen}]... Vui lòng KHÔNG tắt trình duyệt!`;

        try {
            // Lấy file template PDF
            const existingPdfBytes = await fetch(PDF_TEMPLATE_URL).then(res => {
                if (!res.ok) throw new Error("Không tìm thấy file template.pdf. Trình duyệt đang chặn hoặc bạn chưa đưa lên mạng.");
                return res.arrayBuffer();
            });
            const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
            
            // Nhúng font
            pdfDoc.registerFontkit(window.fontkit);
            const fontBytes = await fetch(FONT_URL).then(res => res.arrayBuffer());
            const customFont = await pdfDoc.embedFont(fontBytes);

            // Chỉ định các trang PDF (Theo file gốc 5 trang của bạn)
            const pages = pdfDoc.getPages();
            const page1 = pages[0]; // Trang 1 (Thông tin lương)
            const page2 = pages[1]; // Trang 2 (Ngân hàng)
            const page3 = pages[2]; // Trang 3 (Hồ sơ cá nhân)
            const page4 = pages[3]; // Trang 4 (Phụ lục hình ảnh)

            const fontSize = 11;

            // ===============================================
            // 1. IN VĂN BẢN (CHỈNH SỬA TỌA ĐỘ X, Y Ở ĐÂY)
            // ===============================================
            // In Họ Tên lên Trang 1
            if (emp[0]) page1.drawText(emp[0], { x: 120, y: 700, font: customFont, size: 14 });
            // In Số hiệu lên Trang 1
            if (emp[2]) page1.drawText(emp[2], { x: 350, y: 700, font: customFont, size: fontSize });
            // In Họ Tên lên Trang 3
            if (emp[0]) page3.drawText(emp[0], { x: 120, y: 680, font: customFont, size: 14 });
            // In CCCD lên Trang 3
            if (emp[19]) page3.drawText(emp[19], { x: 120, y: 600, font: customFont, size: fontSize });
            
            // Bạn có thể thêm các lệnh in chữ khác vào đây...

            // ===============================================
            // 2. IN HÌNH ẢNH LÊN CÁC TRANG TƯƠNG ỨNG
            // ===============================================
            
            // Ảnh 4x6 (Cột 44) -> Dán lên Trang 3
            const url4x6 = getDirectImageUrl(emp[44]);
            if (url4x6) {
                try {
                    const imgBytes = await fetch(url4x6).then(res => res.arrayBuffer());
                    const imgEmbed = await pdfDoc.embedJpg(imgBytes);
                    page3.drawImage(imgEmbed, { x: 450, y: 650, width: 90, height: 120 });
                } catch (e) { console.log("Không tải được ảnh 4x6"); }
            }

            // Ảnh Ngân hàng (Cột 46) -> Dán lên Trang 2
            const urlSTK = getDirectImageUrl(emp[46]);
            if (urlSTK && page2) {
                try {
                    const imgBytes = await fetch(urlSTK).then(res => res.arrayBuffer());
                    const imgEmbed = await pdfDoc.embedJpg(imgBytes);
                    page2.drawImage(imgEmbed, { x: 100, y: 200, width: 250, height: 150 });
                } catch (e) {}
            }

            // Ảnh BHXH (Cột 47) -> Dán lên Trang 2 (bên cạnh hoặc phía dưới Thẻ NH)
            const urlBHXH = getDirectImageUrl(emp[47]);
            if (urlBHXH && page2) {
                try {
                    const imgBytes = await fetch(urlBHXH).then(res => res.arrayBuffer());
                    const imgEmbed = await pdfDoc.embedJpg(imgBytes);
                    page2.drawImage(imgEmbed, { x: 100, y: 50, width: 250, height: 120 });
                } catch (e) {}
            }

            // Ảnh CCCD (Cột 45) -> Dán lên Trang 4
            const urlCCCD = getDirectImageUrl(emp[45]);
            if (urlCCCD && page4) {
                try {
                    const imgBytes = await fetch(urlCCCD).then(res => res.arrayBuffer());
                    const imgEmbed = await pdfDoc.embedJpg(imgBytes);
                    page4.drawImage(imgEmbed, { x: 100, y: 400, width: 280, height: 160 });
                } catch (e) {}
            }

            // ===============================================
            // 3. TẢI FILE PDF XUỐNG
            // ===============================================
            const pdfBytes = await pdfDoc.save();
            download(pdfBytes, `HoSo_${hoTen}.pdf`, "application/pdf");
            
            document.getElementById('status').innerText = `✅ Đã xuất PDF thành công cho ${hoTen}!`;
            
        } catch (err) {
            console.error(err);
            alert(err);
            document.getElementById('status').innerText = "❌ Lỗi xuất file PDF.";
        }
    }

    window.onload = loadData;
</script>

</body>
</html>
