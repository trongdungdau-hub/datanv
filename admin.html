<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị Nhân Sự - Xuất PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/downloadjs/1.4.8/download.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 1200px; background: white; padding: 20px; border-radius: 8px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; text-align: center; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px;}
        th { background-color: #0056b3; color: white; }
        .btn-export { background-color: #d9534f; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-reload { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>HỆ THỐNG QUẢN TRỊ - XUẤT HỒ SƠ PDF</h2>
    <button class="btn-reload" onclick="loadData()">🔄 Tải Lại Dữ Liệu Bảng Tính</button>
    <div id="status" style="color: blue; font-style: italic; margin-top: 10px; font-weight: bold;"></div>
    <table>
        <thead>
            <tr>
                <th>Ngày nộp</th>
                <th>Họ Tên</th>
                <th>Nơi sinh</th>
                <th>CCCD</th>
                <th>SĐT</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center;">Bấm "Tải Lại Dữ Liệu" để hiển thị...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWaVZbc24TCQHZoowqhW9tTEf5gtewczPfLMYrKMqDKLfjT9C3jUPYsQyXdNpCRleA/exec";
    const PDF_TEMPLATE_URL = "template.pdf"; 
    const FONT_URL = "https://cdnjs.cloudflare.com/ajax/libs/ink/3.1.10/fonts/Roboto/roboto-regular-webfont.ttf";

    let employeesData = [];

    // HÀM XỬ LÝ ẢNH MỚI: Chống lỗi ô trắng và lấy ảnh tốc độ cao
    async function fetchImageBytes(driveUrl) {
        if (!driveUrl) return null;
        let match = driveUrl.match(/\/d\/(.+?)\//) || driveUrl.match(/id=(.+?)(&|$)/);
        if (!match) return null;
        let id = match[1];
        
        let fetchUrls = [
            `https://lh3.googleusercontent.com/d/${id}`, // Link trực tiếp mạnh nhất
            `https://corsproxy.io/?` + encodeURIComponent(`https://drive.google.com/uc?export=download&id=${id}`) // Link dự phòng
        ];

        for (let u of fetchUrls) {
            try {
                let res = await fetch(u);
                if (res.ok) {
                    let blob = await res.blob();
                    if (blob.type.startsWith('image/')) {
                        return await blob.arrayBuffer(); // Trả về dữ liệu ảnh thô
                    }
                }
            } catch (e) { console.log("Thử lại link ảnh khác..."); }
        }
        return null;
    }

    function toText(value) {
        if (value === null || value === undefined) return "";
        return String(value).trim();
    }

    function formatDate(dateStr) {
        if (!dateStr) return "";
        let d = new Date(dateStr);
        if (isNaN(d.getTime())) return toText(dateStr); 
        let day = ("0" + d.getDate()).slice(-2);
        let month = ("0" + (d.getMonth() + 1)).slice(-2);
        return `${day}/${month}/${d.getFullYear()}`;
    }

    function drawSafe(page, text, x, y, font, size) {
        let str = toText(text);
        if (str !== "") {
            page.drawText(str, { x: x, y: y, font: font, size: size });
        }
    }

    function drawCheck(page, condition, x, y, font) {
        if (condition) {
            page.drawText("V", { x: x, y: y, font: font, size: 14 });
        }
    }

    async function loadData() {
        document.getElementById('status').innerText = "Đang tải dữ liệu...";
        try {
            let res = await fetch(SCRIPT_URL);
            employeesData = await res.json();
            renderTable();
            document.getElementById('status').innerText = "✅ Tải dữ liệu thành công!";
        } catch (e) {
            document.getElementById('status').innerText = "❌ Lỗi kết nối: " + e;
        }
    }

    function renderTable() {
        let html = '';
        employeesData.slice().reverse().forEach((emp, revIndex) => {
            let actualIndex = employeesData.length - 1 - revIndex; 
            if (!emp[0]) return; 
            html += `<tr>
                <td>${formatDate(emp[48])}</td>
                <td><b>${toText(emp[0])}</b></td>
                <td>${toText(emp[2])}</td> 
                <td>${toText(emp[19])}</td>
                <td>${toText(emp[21])}</td>
                <td><button class="btn-export" onclick="generatePDF(${actualIndex})">📄 XUẤT PDF</button></td>
            </tr>`;
        });
        document.getElementById('tableBody').innerHTML = html || '<tr><td colspan="6">Chưa có dữ liệu.</td></tr>';
    }

    async function generatePDF(index) {
        const emp = employeesData[index]; 
        const hoTen = toText(emp[0]) || 'NhanVien';
        document.getElementById('status').innerText = `Đang tải hình ảnh và đóng gói PDF cho [${hoTen}]... KHÔNG tắt trang nhé!`;

        try {
            const existingPdfBytes = await fetch(PDF_TEMPLATE_URL).then(res => res.arrayBuffer());
            const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
            
            pdfDoc.registerFontkit(window.fontkit);
            const fontBytes = await fetch(FONT_URL).then(res => res.arrayBuffer());
            const customFont = await pdfDoc.embedFont(fontBytes);

            const pages = pdfDoc.getPages();
            const page1 = pages[0]; // Trang Lương
            const page2 = pages[1]; // Trang Ngân hàng / BHXH
            const page3 = pages[2]; // Trang Hồ sơ cá nhân
            const page4 = pages[3]; // Trang CCCD

            const fontSize = 11;
            let gioiTinh = toText(emp[4]).toLowerCase();
            let honNhan = toText(emp[17]).toLowerCase();

            // ==========================================================
            // TRANG 1: ĐÃ CĂN LẠI DỰA TRÊN ẢNH BẠN GỬI
            // ==========================================================
            drawSafe(page1, emp[0], 180, 690, customFont, 14); // Họ Tên
            drawSafe(page1, emp[2], 380, 690, customFont, fontSize); // Số hiệu
            drawSafe(page1, emp[1], 500, 690, customFont, fontSize); // Học lực
            drawSafe(page1, emp[5], 180, 645, customFont, fontSize); // Nơi sinh
            drawSafe(page1, formatDate(emp[3]), 380, 645, customFont, fontSize); // Ngày sinh
            
            drawCheck(page1, gioiTinh === "nam", 480, 655, customFont); // Tick Nam
            drawCheck(page1, gioiTinh === "nữ", 480, 635, customFont);  // Tick Nữ

            drawSafe(page1, formatDate(emp[10]), 180, 600, customFont, fontSize); // Ngày làm việc
            drawSafe(page1, emp[6], 180, 565, customFont, fontSize); // Bộ phận
            drawSafe(page1, emp[7], 380, 535, customFont, fontSize); // Chức vụ
            drawSafe(page1, emp[9], 180, 475, customFont, fontSize); // Lương VND

            // ==========================================================
            // TRANG 3: ĐÃ ĐẨY LÊN CHO VỪA KHUNG ĐỎ
            // ==========================================================
            drawSafe(page3, emp[0], 180, 715, customFont, 14); // Họ Tên
            
            drawCheck(page3, gioiTinh === "nam", 355, 715, customFont); // Tick Nam
            drawCheck(page3, gioiTinh === "nữ", 355, 695, customFont);  // Tick Nữ
            drawCheck(page3, true, 440, 715, customFont); // Tick Quốc tịch VN

            drawSafe(page3, formatDate(emp[3]), 180, 680, customFont, fontSize); // Ngày sinh
            drawCheck(page3, honNhan.includes("độc thân") || honNhan.includes("chưa"), 355, 675, customFont); // Tick Chưa KH
            drawCheck(page3, honNhan.includes("đã"), 355, 655, customFont); // Tick Đã KH
            
            drawSafe(page3, emp[5], 480, 680, customFont, fontSize); // Nơi sinh
            drawSafe(page3, emp[18], 180, 640, customFont, fontSize); // Địa chỉ hộ khẩu
            drawSafe(page3, emp[19], 180, 610, customFont, fontSize); // Số CCCD
            drawSafe(page3, formatDate(emp[20]), 450, 610, customFont, fontSize); // Ngày cấp CCCD

            drawSafe(page3, emp[29], 180, 580, customFont, fontSize); // Học vấn
            drawSafe(page3, emp[30], 350, 580, customFont, fontSize); // Tên trường
            drawSafe(page3, emp[21], 480, 580, customFont, fontSize); // SĐT cá nhân

            // ==========================================================
            // CHÈN HÌNH ẢNH: XỬ LÝ GỌN GÀNG, KHÔNG BỊ KHỔNG LỒ
            // ==========================================================
            
            // Hàm nhúng ảnh (Hỗ trợ cả JPG và PNG để chống lỗi ô trắng)
            async function drawImageSafe(page, url, x, y, width, height) {
                let bytes = await fetchImageBytes(url);
                if (bytes) {
                    try {
                        let img = await pdfDoc.embedJpg(bytes).catch(() => pdfDoc.embedPng(bytes));
                        page.drawImage(img, { x, y, width, height });
                    } catch (e) { console.log("Lỗi định dạng ảnh"); }
                }
            }

            // 1. Ảnh 4x6 (Trang 3) - Thu nhỏ gọn vào ô trống
            await drawImageSafe(page3, emp[44], 450, 630, 90, 120);

            // 2. Ảnh Thẻ Ngân hàng (Trang 2) - Kích thước bằng bàn tay
            await drawImageSafe(page2, emp[46], 120, 450, 350, 200);

            // 3. Ảnh Sổ BHXH (Trang 2)
            await drawImageSafe(page2, emp[47], 120, 200, 350, 200);

            // 4. Ảnh CCCD (Trang 4)
            await drawImageSafe(page4, emp[45], 120, 400, 350, 200);

            // Tải file về
            const pdfBytes = await pdfDoc.save();
            download(pdfBytes, `HoSo_${hoTen}.pdf`, "application/pdf");
            document.getElementById('status').innerText = `✅ Đã xuất PDF thành công cho ${hoTen}!`;
            
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "❌ Lỗi xuất file PDF: " + err.message;
        }
    }
    window.onload = loadData;
</script>
</body>
</html>
