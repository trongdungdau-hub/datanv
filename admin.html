<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị Nhân Sự - Xuất PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/downloadjs/1.4.8/download.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #f4f7f6; }
        .container { max-width: 1200px; background: white; padding: 20px; border-radius: 8px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; text-align: center; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; font-size: 14px;}
        th { background-color: #0056b3; color: white; }
        .btn-export { background-color: #d9534f; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
        .btn-export:hover { background-color: #c9302c; }
        .btn-reload { background-color: #28a745; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="container">
    <h2>HỆ THỐNG QUẢN TRỊ - XUẤT HỒ SƠ PDF</h2>
    <button class="btn-reload" onclick="loadData()">🔄 Tải Lại Dữ Liệu Bảng Tính</button>
    <div id="status" style="color: blue; font-style: italic; margin-top: 10px; font-weight: bold;"></div>
    <table>
        <thead>
            <tr>
                <th>Ngày nộp</th>
                <th>Họ Tên</th>
                <th>Nơi sinh</th>
                <th>CCCD</th>
                <th>SĐT</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center;">Bấm "Tải Lại Dữ Liệu" để hiển thị...</td></tr>
        </tbody>
    </table>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWaVZbc24TCQHZoowqhW9tTEf5gtewczPfLMYrKMqDKLfjT9C3jUPYsQyXdNpCRleA/exec";
    const PDF_TEMPLATE_URL = "template.pdf"; 
    const FONT_URL = "https://cdnjs.cloudflare.com/ajax/libs/ink/3.1.10/fonts/Roboto/roboto-regular-webfont.ttf";

    let employeesData = [];

    // Bypass tải ảnh từ Drive
    function getDirectImageUrl(driveUrl) {
        if (!driveUrl) return null;
        let match = driveUrl.match(/\/d\/(.+?)\//) || driveUrl.match(/id=(.+?)(&|$)/);
        if (match && match[1]) {
            return `https://lh3.googleusercontent.com/d/$${match[1]}=w1000`;
        }
        return null;
    }

    function toText(value) {
        if (value === null || value === undefined) return "";
        return String(value).trim();
    }

    function formatDate(dateStr) {
        if (!dateStr) return "";
        let d = new Date(dateStr);
        if (isNaN(d.getTime())) return toText(dateStr); 
        let day = ("0" + d.getDate()).slice(-2);
        let month = ("0" + (d.getMonth() + 1)).slice(-2);
        return `${day}/${month}/${d.getFullYear()}`;
    }

    function drawSafe(page, text, x, y, font, size) {
        let str = toText(text);
        if (str !== "") {
            page.drawText(str, { x: x, y: y, font: font, size: size });
        }
    }

    function drawCheck(page, condition, x, y, font) {
        if (condition) {
            page.drawText("V", { x: x, y: y, font: font, size: 14 });
        }
    }

    async function loadData() {
        document.getElementById('status').innerText = "Đang tải dữ liệu...";
        try {
            let res = await fetch(SCRIPT_URL);
            employeesData = await res.json();
            renderTable();
            document.getElementById('status').innerText = "✅ Tải dữ liệu thành công!";
        } catch (e) {
            document.getElementById('status').innerText = "❌ Lỗi kết nối: " + e;
        }
    }

    function renderTable() {
        let html = '';
        employeesData.slice().reverse().forEach((emp, revIndex) => {
            let actualIndex = employeesData.length - 1 - revIndex; 
            if (!emp[0]) return; 
            html += `<tr>
                <td>${formatDate(emp[48])}</td>
                <td><b>${toText(emp[0])}</b></td>
                <td>${toText(emp[2])}</td> 
                <td>${toText(emp[19])}</td>
                <td>${toText(emp[21])}</td>
                <td><button class="btn-export" onclick="generatePDF(${actualIndex})">📄 XUẤT PDF</button></td>
            </tr>`;
        });
        document.getElementById('tableBody').innerHTML = html || '<tr><td colspan="6">Chưa có dữ liệu.</td></tr>';
    }

    async function generatePDF(index) {
        const emp = employeesData[index]; 
        const hoTen = toText(emp[0]) || 'NhanVien';
        document.getElementById('status').innerText = `Đang xử lý PDF và tải hình ảnh cho [${hoTen}]... Vui lòng đợi!`;

        try {
            const existingPdfBytes = await fetch(PDF_TEMPLATE_URL).then(res => res.arrayBuffer());
            const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
            
            pdfDoc.registerFontkit(window.fontkit);
            const fontBytes = await fetch(FONT_URL).then(res => res.arrayBuffer());
            const customFont = await pdfDoc.embedFont(fontBytes);

            const pages = pdfDoc.getPages();
            const page1 = pages[0]; // Trang 1
            const page2 = pages[1]; // Trang 2
            const page3 = pages[2]; // Trang 3
            const page4 = pages[3]; // Trang 4

            const fontSize = 11;
            let gioiTinh = toText(emp[4]).toLowerCase();
            let honNhan = toText(emp[17]).toLowerCase();

            // ==========================================================
            // TRANG 1: ĐÃ ÉP TỤT XUỐNG 30-35 PIXEL
            // ==========================================================
            drawSafe(page1, emp[0], 130, 675, customFont, 12); // Họ Tên
            drawSafe(page1, emp[2], 360, 675, customFont, fontSize); // Số hiệu
            drawSafe(page1, emp[1], 480, 675, customFont, fontSize); // Học lực
            
            drawSafe(page1, emp[5], 130, 635, customFont, fontSize); // Nơi sinh
            drawSafe(page1, formatDate(emp[3]), 360, 635, customFont, fontSize); // Ngày sinh
            
            drawCheck(page1, gioiTinh === "nam", 456, 635, customFont); // Tick Nam
            drawCheck(page1, gioiTinh === "nữ", 500, 635, customFont);  // Tick Nữ

            drawSafe(page1, formatDate(emp[10]), 130, 595, customFont, fontSize); // Ngày bắt đầu làm việc
            drawSafe(page1, emp[6], 130, 560, customFont, fontSize); // Bộ phận
            drawSafe(page1, emp[7], 360, 530, customFont, fontSize); // Chức vụ
            drawSafe(page1, emp[9], 130, 470, customFont, fontSize); // Mức lương VND

            // ==========================================================
            // TRANG 3: ĐÃ ÉP TỤT XUỐNG 35 PIXEL SO VỚI BẢN CŨ
            // ==========================================================
            drawSafe(page3, emp[0], 130, 700, customFont, 12); // Họ Tên
            
            drawCheck(page3, gioiTinh === "nam", 328, 700, customFont); // Tick Nam 
            drawCheck(page3, gioiTinh === "nữ", 328, 685, customFont);  // Tick Nữ 
            drawCheck(page3, true, 417, 707, customFont); // Tick Quốc tịch VN

            drawSafe(page3, formatDate(emp[3]), 130, 665, customFont, fontSize); // Ngày sinh
            drawCheck(page3, honNhan.includes("độc thân") || honNhan.includes("chưa"), 328, 670, customFont); // Tick Chưa KH
            drawCheck(page3, honNhan.includes("đã"), 328, 655, customFont); // Tick Đã KH
            
            drawSafe(page3, emp[5], 440, 660, customFont, fontSize); // Nơi sinh (Trang 3)
            drawSafe(page3, emp[18], 130, 625, customFont, fontSize); // Địa chỉ hộ khẩu
            drawSafe(page3, emp[19], 130, 590, customFont, fontSize); // Số CCCD
            drawSafe(page3, formatDate(emp[20]), 370, 590, customFont, fontSize); // Ngày cấp CCCD

            drawSafe(page3, emp[29], 130, 560, customFont, fontSize); // Học vấn
            drawSafe(page3, emp[30], 360, 560, customFont, fontSize); // Tên trường
            
            // Đã đẩy SĐT sang phải (X từ 460 lên 500) và tụt xuống
            drawSafe(page3, emp[21], 500, 560, customFont, fontSize); // SĐT cá nhân

            // ==========================================================
            // CHÈN HÌNH ẢNH 
            // ==========================================================
            // 1. Ảnh 4x6 (Tụt Y xuống 590 cho cân đối)
            const url4x6 = getDirectImageUrl(emp[44]);
            if (url4x6 && page3) {
                try {
                    const imgBytes = await fetch(url4x6).then(res => res.arrayBuffer());
                    const imgEmbed = await pdfDoc.embedJpg(imgBytes);
                    page3.drawImage(imgEmbed, { x: 455, y: 590, width: 85, height: 115 });
                } catch (e) { console.log("Không tải được ảnh 4x6"); }
            }

            // 2. Ảnh Thẻ Ngân hàng
            const urlSTK = getDirectImageUrl(emp[46]);
            if (urlSTK && page2) {
                try {
                    const imgBytes = await fetch(urlSTK).then(res => res.arrayBuffer());
                    const imgEmbed = await pdfDoc.embedJpg(imgBytes);
                    page2.drawImage(imgEmbed, { x: 140, y: 250, width: 300, height: 180 });
                } catch (e) {}
            }

            // 3. Ảnh Sổ BHXH
            const urlBHXH = getDirectImageUrl(emp[47]);
            if (urlBHXH && page2) {
                try {
                    const imgBytes = await fetch(urlBHXH).then(res => res.arrayBuffer());
                    const imgEmbed = await pdfDoc.embedJpg(imgBytes);
                    page2.drawImage(imgEmbed, { x: 140, y: 50, width: 300, height: 180 });
                } catch (e) {}
            }

            // 4. Ảnh CCCD
            const urlCCCD = getDirectImageUrl(emp[45]);
            if (urlCCCD && page4) {
                try {
                    const imgBytes = await fetch(urlCCCD).then(res => res.arrayBuffer());
                    const imgEmbed = await pdfDoc.embedJpg(imgBytes);
                    page4.drawImage(imgEmbed, { x: 140, y: 150, width: 320, height: 200 });
                } catch (e) {}
            }

            // Tải file về
            const pdfBytes = await pdfDoc.save();
            download(pdfBytes, `HoSo_${hoTen}.pdf`, "application/pdf");
            document.getElementById('status').innerText = `✅ Đã xuất PDF thành công cho ${hoTen}!`;
            
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "❌ Lỗi xuất file PDF: " + err.message;
        }
    }
    window.onload = loadData;
</script>
</body>
</html>
