<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Hệ thống quản trị - Xuất hồ sơ PDF</title>

  <!-- PDF libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
  <script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/downloadjs/1.4.8/download.min.js"></script>

  <style>
    :root{
      --blue:#0056b3;
      --bg:#f4f7f6;
      --danger:#d9534f;
      --danger-hover:#c9302c;
      --success:#28a745;
      --success-hover:#1f8a36;
      --text:#1f2937;
      --muted:#6b7280;
      --border:#e5e7eb;
      --card:#ffffff;
      --warn-bg:#fff3cd;
      --warn-border:#ffeeba;
    }
    *{box-sizing:border-box}
    body{font-family:Arial,sans-serif;padding:20px;background:var(--bg);color:var(--text)}
    .container{
      max-width:1200px;background:var(--card);
      padding:20px;border-radius:10px;margin:auto;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
    }
    h2{
      color:var(--blue);text-align:center;text-transform:uppercase;
      margin:10px 0 16px;
      letter-spacing:.5px;
    }

    .topbar{
      display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between;
      margin:10px 0 14px;
    }
    .left-actions{display:flex;gap:10px;flex-wrap:wrap}
    .right-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .btn{
      border:none;padding:10px 14px;cursor:pointer;border-radius:8px;
      font-weight:700;display:inline-flex;gap:8px;align-items:center;
      transition:.15s ease-in-out;
      user-select:none;
    }
    .btn-reload{background:var(--success);color:#fff}
    .btn-reload:hover{background:var(--success-hover)}
    .btn-export{background:var(--danger);color:#fff;padding:8px 12px;border-radius:7px}
    .btn-export:hover{background:var(--danger-hover)}
    .btn-ghost{
      background:#eef2ff;color:#1e3a8a;border:1px solid #dbeafe;font-weight:700;
    }
    .btn-ghost:hover{filter:brightness(.98)}
    .pill{
      padding:8px 10px;border:1px solid var(--border);border-radius:10px;
      color:var(--muted);background:#fafafa;font-size:13px;
    }
    input[type="text"]{
      padding:10px 12px;border-radius:10px;border:1px solid var(--border);
      min-width:260px;outline:none;
    }
    input[type="text"]:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(59,130,246,.12)}

    #status{
      color:#7c2d12;font-weight:700;margin-top:10px;white-space:pre-wrap;
      background:var(--warn-bg);padding:12px 14px;border-radius:10px;
      display:none;line-height:1.6;border:1px solid var(--warn-border);
    }

    table{width:100%;border-collapse:collapse;margin-top:14px;overflow:hidden;border-radius:10px}
    th,td{border:1px solid var(--border);padding:10px;text-align:left;font-size:14px;vertical-align:top}
    th{background:var(--blue);color:#fff}
    tbody tr:hover{background:#f9fafb}
    .name{font-weight:800}
    .muted{color:var(--muted);font-size:12px}
    .nowrap{white-space:nowrap}
    .center{text-align:center}

    @media (max-width: 768px){
      body{padding:10px}
      .container{padding:14px}
      input[type="text"]{min-width:180px;width:100%}
      .right-actions{width:100%}
      .topbar{gap:12px}
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>HỆ THỐNG QUẢN TRỊ - XUẤT HỒ SƠ PDF</h2>

    <div class="topbar">
      <div class="left-actions">
        <button class="btn btn-reload" onclick="loadData()">🔄 Tải lại dữ liệu</button>
        <button class="btn btn-ghost" onclick="testImgEndpoint()">🧪 Test ảnh (endpoint)</button>
      </div>
      <div class="right-actions">
        <input id="searchBox" type="text" placeholder="Tìm theo tên / CCCD / SĐT..." oninput="renderTable()"/>
        <span class="pill" id="countPill">0 hồ sơ</span>
      </div>
    </div>

    <div id="status"></div>

    <table>
      <thead>
        <tr>
          <th class="nowrap">Ngày nộp</th>
          <th>Họ tên</th>
          <th>Nơi sinh</th>
          <th>CCCD</th>
          <th>SĐT</th>
          <th class="center nowrap">Thao tác</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6" class="center">Bấm “Tải lại dữ liệu” để hiển thị...</td></tr>
      </tbody>
    </table>
  </div>

<script>
/** ================== CONFIG ================== **/
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWaVZbc24TCQHZoowqhW9tTEf5gtewczPfLMYrKMqDKLfjT9C3jUPYsQyXdNpCRleA/exec";
const PDF_TEMPLATE_URL = "template.pdf"; // phải nằm cùng folder admin.html
const FONT_URL = "https://cdnjs.cloudflare.com/ajax/libs/ink/3.1.10/fonts/Roboto/roboto-regular-webfont.ttf";

/**
 * Nếu sheet của bạn đang trả dạng MẢNG (row array), đây là map index dùng để fill PDF.
 * Nếu sau này script trả dạng OBJECT theo key, code vẫn chạy (getVal() tự hiểu).
 */
const IDX = {
  hoTen: 0,
  hocLuc: 1,
  msnv: 2,
  ngaySinh: 3,
  gioiTinh: 4,
  noiSinh: 5,
  boPhan: 6,
  viTri: 7,
  mucLuong: 9,
  ngayVaoLam: 10,
  tinh: 18,
  cccd: 19,
  ngayCapCccd: 20,
  sdt: 21,
  nganhNghe: 29,
  daiHoc: 30,

  // Link/ID ảnh (tùy sheet bạn đang lưu)
  anhThe: 44,
  cccdAnh: 45,    // có thể là link mặt trước / hoặc 1 link chung
  anhSTK: 46,
  anhSoBHXH: 47,
  ngayNop: 48,
};

/**
 * Mapping field trên PDF template (tên field phải khớp với template.pdf)
 * Nếu template của bạn đặt tên hơi khác, cứ sửa tại đây.
 */
const PDF_FIELDS = {
  hoTen: ["Họ Tên", "Ho Ten", "HOTEN"],
  msnv: ["MSNV", "Mã số", "Ma so"],
  hocLuc: ["Học Lực", "Hoc Luc"],
  noiSinh: ["Nơi Sinh", "Noi Sinh"],
  ngaySinh: ["Ngày sinh", "Ngày_sinh", "Ngay sinh"],
  ngayVaoLam: ["Ngày vào làm", "Ngay vao lam"],
  boPhan: ["Bộ phận", "Bo phan"],
  viTri: ["Vị trí", "Vi tri"],
  mucLuong: ["Mức lương căn bản", "Muc luong can ban"],
  tinh: ["Tỉnh", "Tinh"],
  cccd: ["CCCD", "CMND"],
  ngayCapCccd: ["Ngày cấp CCCD", "Ngay cap CCCD"],
  sdt: ["SDT", "SĐT", "Phone"],
  nganhNghe: ["Ngành nghề", "Nganh nghe"],
  daiHoc: ["Đại học", "Dai hoc"],
  cbNam: ["Nam"],
  cbNu: ["Nữ", "Nu"],
};

const PDF_IMAGES = [
  // fieldName(s), srcKey, pageIndex(0-based), label
  { names:["Ảnh cá nhân_af_image","Ảnh cá nhân","Anh ca nhan"], src:"anhThe", page:2, label:"Ảnh thẻ 4x6" },
  { names:["Ảnh STK _af_image","Ảnh STK_af_image","Ảnh STK","Anh STK"], src:"anhSTK", page:1, label:"Ảnh thẻ ngân hàng" },
  { names:["Ảnh SoBHXH_af_image","Ảnh Sổ BHXH","SoBHXH"], src:"anhSoBHXH", page:1, label:"Ảnh sổ BHXH" },

  { names:["CCCC_ANH_1_af_image","CCCD_ANH_1","CCCD_TRUOC"], src:"cccdFront", page:3, label:"CCCD mặt trước" },
  { names:["CCCC_ANH_2_af_image","CCCD_ANH_2","CCCD_SAU"], src:"cccdBack", page:3, label:"CCCD mặt sau" },

  { names:["Ảnh DDCN_af_image","Ảnh ĐDCN","DINH_DANH"], src:"dinhDanh", page:3, label:"Ảnh định danh" },
];

/** ================== STATE ================== **/
let rowsRaw = [];
let rowsNorm = [];

/** ================== HELPERS ================== **/
const $ = (id)=>document.getElementById(id);

function showStatus(text){
  const st = $("status");
  st.style.display = "block";
  st.innerText = text;
}
function appendStatus(text){
  const st = $("status");
  st.style.display = "block";
  st.innerText += text;
}
function hideStatusSoon(ms=2000){
  setTimeout(()=>{$("status").style.display="none";}, ms);
}

function toText(v){
  if (v === null || v === undefined) return "";
  return String(v).trim();
}

function formatDateAny(v){
  if (!v) return "";
  // Nếu sheet trả kiểu "03/03/2026" => giữ nguyên
  const s = toText(v);
  // Nếu ISO / Date parse được => format dd/mm/yyyy
  const d = new Date(s);
  if (!isNaN(d.getTime())){
    const dd = String(d.getDate()).padStart(2,"0");
    const mm = String(d.getMonth()+1).padStart(2,"0");
    const yy = d.getFullYear();
    return `${dd}/${mm}/${yy}`;
  }
  return s;
}

/**
 * normalize: hỗ trợ cả row dạng ARRAY và row dạng OBJECT
 */
function getVal(row, key, idx, fallbackIdx){
  if (!row) return "";
  if (typeof row === "object" && !Array.isArray(row)){
    if (row[key] !== undefined) return row[key];
    // thử thêm vài key hay gặp
    const altKeyMap = {
      hoTen: ["hoten","ho_ten","name","Họ Tên","HọTên"],
      msnv: ["msnv","ma_so","mã_số","employee_id"],
      noiSinh: ["noiSinh","noisinh","placeOfBirth","Nơi sinh"],
      cccd: ["cccd","cmnd","idNumber","CCCD"],
      sdt: ["sdt","phone","tel","SĐT"],
      ngayNop: ["ngayNop","createdAt","timestamp","Ngày nộp"],
      anhThe: ["anhThe","avatar","photo","Ảnh thẻ"],
      cccdAnh: ["cccdAnh","cccd","anhCccd","Ảnh CCCD"],
      anhSTK: ["anhSTK","bankCard","stk"],
      anhSoBHXH: ["anhSoBHXH","bhxh","soBhxh"],
      cccdFront: ["cccdFront","cccdTruoc","cccd_mat_truoc"],
      cccdBack: ["cccdBack","cccdSau","cccd_mat_sau"],
      dinhDanh: ["dinhDanh","face","selfie"],
    };
    const alts = altKeyMap[key] || [];
    for (const k of alts){
      if (row[k] !== undefined) return row[k];
    }
    return "";
  }
  // array
  if (Array.isArray(row)){
    if (idx !== undefined && row[idx] !== undefined) return row[idx];
    if (fallbackIdx !== undefined && row[fallbackIdx] !== undefined) return row[fallbackIdx];
    return "";
  }
  return "";
}

function extractDriveId(input){
  if (!input) return null;
  const s = String(input).trim();

  // data uri
  if (s.startsWith("data:image/")) return null;

  // /d/FILEID/
  let m = s.match(/\/d\/([a-zA-Z0-9_-]{20,})/);
  if (m) return m[1];

  // id=FILEID
  m = s.match(/[?&]id=([a-zA-Z0-9_-]{20,})/);
  if (m) return m[1];

  // chỉ là id
  m = s.match(/^([a-zA-Z0-9_-]{20,})$/);
  if (m) return m[1];

  return null;
}

function base64ToArrayBuffer(base64){
  const binary = atob(base64);
  const len = binary.length;
  const bytes = new Uint8Array(len);
  for (let i=0;i<len;i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}

/**
 * Lấy bytes ảnh theo thứ tự ưu tiên:
 * 1) Apps Script ?action=img&id=...
 * 2) Nếu input là data:image/... base64
 * 3) Fallback: thử proxy (corsproxy/allorigins) như bản cũ nhưng chắc chắn hơn
 */
async function fetchImagePack(driveUrlOrId){
  const input = toText(driveUrlOrId);
  if (!input) return null;

  // 2) data uri
  if (input.startsWith("data:image/")){
    const parts = input.split(",");
    if (parts.length < 2) return null;
    const meta = parts[0]; // data:image/png;base64
    const b64 = parts[1];
    const mime = meta.split(";")[0].replace("data:","");
    return { bytes: base64ToArrayBuffer(b64), mime };
  }

  const id = extractDriveId(input);
  if (id){
    // 1) Apps Script endpoint (ổn định nhất)
    try{
      const url = `${SCRIPT_URL}?action=img&id=${encodeURIComponent(id)}&v=${Date.now()}`;
      const res = await fetch(url);
      if (res.ok){
        const json = await res.json();
        if (json && json.ok && json.data){
          return { bytes: base64ToArrayBuffer(json.data), mime: json.mime || "" };
        }
      }
    }catch(e){}

    // 3) fallback proxies (hên xui)
    const direct = `https://drive.google.com/uc?export=download&id=${id}`;
    const tries = [
      `https://corsproxy.io/?${encodeURIComponent(direct)}`,
      `https://api.allorigins.win/raw?url=${encodeURIComponent(direct)}`
    ];

    for (const u of tries){
      try{
        const res = await fetch(u);
        if (!res.ok) continue;

        const ct = (res.headers.get("content-type") || "").toLowerCase();
        const buf = await res.arrayBuffer();
        if (buf && buf.byteLength > 1000){
          // dù ct không phải image, vẫn thử embed
          return { bytes: buf, mime: ct };
        }
      }catch(e){}
    }
  }

  return null;
}

/**
 * Field finder: khớp tên field linh hoạt (case-insensitive, bỏ khoảng trắng)
 */
function normalizeName(s){
  return toText(s).toLowerCase().replace(/\s+/g,"").replace(/_/g,"").replace(/-/g,"");
}
function findFieldByCandidates(form, candidates){
  const all = form.getFields();
  const want = candidates.map(normalizeName);
  for (const f of all){
    const n = normalizeName(f.getName());
    if (want.includes(n)) return f;
  }
  return null;
}
function trySetText(form, candidates, value, font){
  const v = toText(value);
  if (!v) return;
  try{
    const field = findFieldByCandidates(form, candidates);
    if (!field) return;
    // text field
    if (field.setText){
      field.setText(v);
      if (field.updateAppearances) field.updateAppearances(font);
    }
  }catch(e){}
}
function tryCheck(form, candidates, shouldCheck){
  if (!shouldCheck) return;
  try{
    const field = findFieldByCandidates(form, candidates);
    if (!field) return;
    if (field.check) field.check();
  }catch(e){}
}

/** Xóa field nền trắng + vẽ ảnh lên đúng rect */
async function putImageOverField(form, pdfDoc, fieldCandidates, srcValue, pageIndex, label){
  const field = findFieldByCandidates(form, fieldCandidates);
  if (!field){
    appendStatus(`\n⚠️ Không tìm thấy field ảnh: ${fieldCandidates[0]} (${label})`);
    return;
  }

  const widgets = field.acroField?.getWidgets?.() || [];
  if (!widgets.length){
    appendStatus(`\n⚠️ Field ảnh không có widget: ${fieldCandidates[0]} (${label})`);
    return;
  }
  const rect = widgets[0].getRectangle();

  appendStatus(`\n⏳ Nhúng ảnh: ${label}...`);

  const pack = await fetchImagePack(srcValue);
  if (!pack || !pack.bytes){
    appendStatus(` ❌ Không lấy được bytes ảnh.`);
    return;
  }

  let img = null;
  try{
    const mime = (pack.mime || "").toLowerCase();
    if (mime.includes("png")) img = await pdfDoc.embedPng(pack.bytes);
    else img = await pdfDoc.embedJpg(pack.bytes);
  }catch(e){
    // fallback thử lần lượt
    try{ img = await pdfDoc.embedPng(pack.bytes); }
    catch(e2){
      try{ img = await pdfDoc.embedJpg(pack.bytes); }
      catch(e3){
        appendStatus(` ❌ Bytes không phải ảnh hợp lệ.`);
        return;
      }
    }
  }

  try{
    // xóa field để mất nền trắng
    form.removeField(field.getName());
  }catch(e){}

  const pages = pdfDoc.getPages();
  const page = pages[pageIndex] || pages[0];
  page.drawImage(img, { x: rect.x, y: rect.y, width: rect.width, height: rect.height });

  appendStatus(` ✅ OK`);
}

/** ================== DATA LOAD + RENDER ================== **/
async function loadData(){
  showStatus("⏳ Đang tải dữ liệu...");
  try{
    const res = await fetch(`${SCRIPT_URL}?action=data&v=${Date.now()}`);
    const json = await res.json();

    // json có thể là: [rows] hoặc {data:[rows]}
    rowsRaw = Array.isArray(json) ? json : (json.data || []);
    // loại bỏ header nếu row đầu là header
    rowsNorm = rowsRaw.slice();

    // nếu row đầu có chữ "Họ tên" thì remove header
    if (rowsNorm.length && Array.isArray(rowsNorm[0])){
      const head0 = toText(rowsNorm[0][0]).toLowerCase();
      if (head0.includes("họ") || head0.includes("ho")) rowsNorm.shift();
    }

    renderTable();
    showStatus("✅ Tải dữ liệu thành công!");
    hideStatusSoon(1500);
  }catch(e){
    showStatus("❌ Lỗi tải dữ liệu: " + (e?.message || e));
  }
}

function rowToSearchText(row){
  const name = toText(getVal(row,"hoTen",IDX.hoTen));
  const cccd = toText(getVal(row,"cccd",IDX.cccd));
  const sdt  = toText(getVal(row,"sdt",IDX.sdt));
  const msnv = toText(getVal(row,"msnv",IDX.msnv));
  return `${name} ${cccd} ${sdt} ${msnv}`.toLowerCase();
}

function renderTable(){
  const q = toText($("searchBox").value).toLowerCase();
  let list = rowsNorm.filter(r=>{
    const name = toText(getVal(r,"hoTen",IDX.hoTen));
    if (!name) return false;
    if (!q) return true;
    return rowToSearchText(r).includes(q);
  });

  // mới nhất lên trước
  list = list.slice().reverse();

  $("countPill").innerText = `${list.length} hồ sơ`;

  let html = "";
  list.forEach((row, viewIndex)=>{
    const realIndex = rowsNorm.length - 1 - viewIndex; // index theo rowsNorm
    const ngayNop = formatDateAny(getVal(row,"ngayNop",IDX.ngayNop));
    const hoTen = toText(getVal(row,"hoTen",IDX.hoTen));
    const noiSinh = toText(getVal(row,"noiSinh",IDX.noiSinh, IDX.msnv)); // fallback nếu sheet lệch
    const cccd = toText(getVal(row,"cccd",IDX.cccd));
    const sdt  = toText(getVal(row,"sdt",IDX.sdt));

    html += `
      <tr>
        <td class="nowrap">${ngayNop || "<span class='muted'>(trống)</span>"}</td>
        <td><div class="name">${escapeHtml(hoTen)}</div></td>
        <td>${escapeHtml(noiSinh)}</td>
        <td class="nowrap">${escapeHtml(cccd)}</td>
        <td class="nowrap">${escapeHtml(sdt)}</td>
        <td class="center">
          <button class="btn-export" onclick="generatePDFByViewIndex(${realIndex})">📄 XUẤT PDF</button>
        </td>
      </tr>
    `;
  });

  $("tableBody").innerHTML = html || `<tr><td colspan="6" class="center">Chưa có dữ liệu.</td></tr>`;
}

function escapeHtml(s){
  return toText(s)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

/** ================== PDF EXPORT ================== **/
function pickImageSources(row){
  // Ưu tiên key object nếu có; còn không thì index.
  const anhThe = getVal(row,"anhThe",IDX.anhThe);
  const anhSTK = getVal(row,"anhSTK",IDX.anhSTK);
  const anhSoBHXH = getVal(row,"anhSoBHXH",IDX.anhSoBHXH);

  // CCCD: nếu có front/back riêng thì dùng, không thì dùng 1 link chung
  const cccdFront = getVal(row,"cccdFront", undefined) || getVal(row,"cccdAnh",IDX.cccdAnh);
  const cccdBack  = getVal(row,"cccdBack", undefined)  || getVal(row,"cccdAnh",IDX.cccdAnh);
  const dinhDanh  = getVal(row,"dinhDanh", undefined)  || getVal(row,"cccdAnh",IDX.cccdAnh);

  return { anhThe, anhSTK, anhSoBHXH, cccdFront, cccdBack, dinhDanh };
}

async function generatePDFByViewIndex(index){
  const row = rowsNorm[index];
  const hoTen = toText(getVal(row,"hoTen",IDX.hoTen)) || "NhanVien";

  showStatus(`🔄 ĐANG XỬ LÝ HỒ SƠ CHO [${hoTen}]...\n----------------------------------------`);

  try{
    // load template (chống cache)
    const tplBytes = await fetch(`${PDF_TEMPLATE_URL}?v=${Date.now()}`).then(r=>r.arrayBuffer());
    const pdfDoc = await PDFLib.PDFDocument.load(tplBytes);

    pdfDoc.registerFontkit(window.fontkit);
    const fontBytes = await fetch(FONT_URL).then(r=>r.arrayBuffer());
    const customFont = await pdfDoc.embedFont(fontBytes);

    const form = pdfDoc.getForm();

    // text fields
    trySetText(form, PDF_FIELDS.hoTen, getVal(row,"hoTen",IDX.hoTen), customFont);
    trySetText(form, PDF_FIELDS.msnv, getVal(row,"msnv",IDX.msnv), customFont);
    trySetText(form, PDF_FIELDS.hocLuc, getVal(row,"hocLuc",IDX.hocLuc), customFont);
    trySetText(form, PDF_FIELDS.noiSinh, getVal(row,"noiSinh",IDX.noiSinh), customFont);
    trySetText(form, PDF_FIELDS.ngaySinh, formatDateAny(getVal(row,"ngaySinh",IDX.ngaySinh)), customFont);
    trySetText(form, PDF_FIELDS.ngayVaoLam, formatDateAny(getVal(row,"ngayVaoLam",IDX.ngayVaoLam)), customFont);
    trySetText(form, PDF_FIELDS.boPhan, getVal(row,"boPhan",IDX.boPhan), customFont);
    trySetText(form, PDF_FIELDS.viTri, getVal(row,"viTri",IDX.viTri), customFont);
    trySetText(form, PDF_FIELDS.mucLuong, getVal(row,"mucLuong",IDX.mucLuong), customFont);
    trySetText(form, PDF_FIELDS.tinh, getVal(row,"tinh",IDX.tinh), customFont);
    trySetText(form, PDF_FIELDS.cccd, getVal(row,"cccd",IDX.cccd), customFont);
    trySetText(form, PDF_FIELDS.ngayCapCccd, formatDateAny(getVal(row,"ngayCapCccd",IDX.ngayCapCccd)), customFont);
    trySetText(form, PDF_FIELDS.sdt, getVal(row,"sdt",IDX.sdt), customFont);
    trySetText(form, PDF_FIELDS.nganhNghe, getVal(row,"nganhNghe",IDX.nganhNghe), customFont);
    trySetText(form, PDF_FIELDS.daiHoc, getVal(row,"daiHoc",IDX.daiHoc), customFont);

    // checkbox giới tính
    const gt = toText(getVal(row,"gioiTinh",IDX.gioiTinh)).toLowerCase();
    tryCheck(form, PDF_FIELDS.cbNam, gt === "nam");
    tryCheck(form, PDF_FIELDS.cbNu, gt === "nữ" || gt === "nu" || gt === "female");

    // images
    const imgSrc = pickImageSources(row);
    for (const it of PDF_IMAGES){
      const srcVal = imgSrc[it.src] || getVal(row, it.src, IDX[it.src]);
      if (!toText(srcVal)) {
        appendStatus(`\n⚠️ Bỏ qua ảnh (${it.label}): không có dữ liệu.`);
        continue;
      }
      await putImageOverField(form, pdfDoc, it.names, srcVal, it.page, it.label);
    }

    // flatten
    try { form.flatten(); } catch(e){}

    const outBytes = await pdfDoc.save();
    download(outBytes, `HoSo_${hoTen}.pdf`, "application/pdf");

    appendStatus(`\n----------------------------------------\n🎉 XONG!`);
    hideStatusSoon(2200);

  }catch(err){
    console.error(err);
    appendStatus(`\n❌ Lỗi: ${err?.message || err}`);
  }
}
