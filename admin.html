<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý & Xuất PDF</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #2563eb; text-align: center; text-transform: uppercase; margin-bottom: 25px; }
        .control-panel { display: flex; gap: 15px; margin-bottom: 25px; align-items: center; justify-content: center; }
        .btn { padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 15px; border: none; transition: 0.2s; color: #fff;}
        .btn-primary { background: #2563eb; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; font-weight: 600; }
        tr:hover { background: #f1f5f9; }
        #status { text-align: center; font-weight: bold; color: #d97706; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📂 HỆ THỐNG XUẤT HỒ SƠ PDF</h2>
    
    <div class="control-panel">
        <button class="btn btn-primary" id="btnLoadData" onclick="loadData()">🔄 Tải danh sách nhân viên</button>
    </div>
    
    <div id="status">⏳ Đang xử lý... Vui lòng đợi!</div>

    <table id="employeeTable">
        <thead>
            <tr>
                <th>STT</th>
                <th>Họ và Tên</th>
                <th>Ngày sinh</th>
                <th>Chức vụ</th>
                <th>Thao tác</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="5" style="text-align:center; color:#94a3b8;">Chưa có dữ liệu, vui lòng bấm Tải danh sách!</td></tr>
        </tbody>
    </table>
</div>

<script>
// --- ĐIỀN LINK GOOGLE APPS SCRIPT CỦA MÀY VÀO ĐÂY ---
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWaVZbc24TCQHZoowqhW9tTEf5gtewczPfLMYrKMqDKLfjT9C3jUPYsQyXdNpCRleA/exec";

// KHAI BÁO LINK FILE PDF VÀ FONT CHỮ TRÊN GITHUB CỦA MÀY
// Mày phải up 1 file tên là 'form.pdf' và 1 file tên là 'font.ttf' (Font hỗ trợ tiếng Nhật & Việt) lên cùng thư mục Github
const PDF_URL = "form.pdf"; 
const FONT_URL = "font.ttf"; 

let employeeDataList = [];

// ==========================================================
// 1. HÀM TẢI DỮ LIỆU TỪ GOOGLE SHEET VỀ WEB
// ==========================================================
async function loadData() {
    let btn = document.getElementById("btnLoadData");
    let status = document.getElementById("status");
    btn.disabled = true;
    status.innerText = "⏳ Đang tải dữ liệu từ Google Sheet...";
    status.style.display = "block";

    try {
        let res = await fetch(SCRIPT_URL + "?action=getData");
        let data = await res.json();
        
        employeeDataList = data; // Lưu data vào bộ nhớ
        renderTable(data);
        
        status.style.display = "none";
    } catch (error) {
        status.innerText = "❌ Lỗi: Không thể kết nối tới Google Sheet!";
    } finally {
        btn.disabled = false;
    }
}

function renderTable(data) {
    let tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    if(data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;">Không có dữ liệu nào!</td></tr>`;
        return;
    }

    data.forEach((emp, index) => {
        let tr = document.createElement("tr");
        
        // Mặc định tên ở cột 0, ngày sinh cột 3, chức vụ cột 7 (Theo đúng thiết kế form index.html)
        let name = emp[0] || emp["col0"] || "Chưa nhập tên";
        let dob = emp[3] || emp["col3"] || "---";
        let role = emp[7] || emp["col7"] || "---";

        tr.innerHTML = `
            <td>${index + 1}</td>
            <td><b>${name}</b></td>
            <td>${dob}</td>
            <td>${role}</td>
            <td>
                <button class="btn btn-success" style="padding: 8px 15px; font-size: 13px;" onclick="exportPDF(${index})">
                    🖨️ Xuất PDF
                </button>
            </td>
        `;
        tbody.appendChild(tr);
    });
}

// ==========================================================
// 2. HÀM XỬ LÝ VÀ ĐIỀN DỮ LIỆU VÀO PDF (ĐÃ FIX CHUẨN MỌI LỖI)
// ==========================================================
async function exportPDF(index) {
    let status = document.getElementById("status");
    status.innerText = "⏳ Đang vẽ dữ liệu lên file PDF. Quá trình này có thể mất 5-10 giây...";
    status.style.display = "block";

    try {
        let emp = employeeDataList[index];

        // Tải file PDF trống và Font chữ
        const [pdfBytes, fontBytes] = await Promise.all([
            fetch(PDF_URL).then(res => res.arrayBuffer()),
            fetch(FONT_URL).then(res => res.arrayBuffer())
        ]);

        // Mở PDF và nhúng Font
        const { PDFDocument } = PDFLib;
        const pdfDoc = await PDFDocument.load(pdfBytes);
        pdfDoc.registerFontkit(window.fontkit);
        const customFont = await pdfDoc.embedFont(fontBytes);
        const form = pdfDoc.getForm();

        // -----------------------------------------------------
        // BƯỚC A: VÒNG LẶP ĐIỀN TỰ ĐỘNG CÁC Ô CHỮ BÌNH THƯỜNG (0 ĐẾN 44)
        // -----------------------------------------------------
        for (let i = 0; i <= 44; i++) {
            let val = emp[i] !== undefined ? emp[i] : emp["col"+i]; 
            if (val) {
                try {
                    let field = form.getTextField(String(i));
                    if (field) {
                        field.setText(String(val));
                        field.updateAppearances(customFont);
                    }
                } catch(e) {} // Bỏ qua nếu trên file PDF không vẽ ô này
            }
        }

        // -----------------------------------------------------
        // BƯỚC B: XÀO NẤU NGÀY THÁNG NĂM SINH (KANJI - SONG NGỮ)
        // -----------------------------------------------------
        let dob = emp[3] || emp["col3"];
        if(dob) {
            try {
                let rawDate = String(dob);
                let d = new Date(rawDate);
                
                // Fix lỗi parse ngày tháng (DD/MM/YYYY vs YYYY-MM-DD)
                if (rawDate.includes('/')) {
                    let parts = rawDate.split('/');
                    if(parts[0].length === 2) d = new Date(`${parts[2]}-${parts[1]}-${parts[0]}`);
                }

                if(!isNaN(d)) {
                    let dd = ("0" + d.getDate()).slice(-2);
                    let mm = ("0" + (d.getMonth() + 1)).slice(-2);
                    let yyyy = d.getFullYear().toString();

                    // 1. Ghi đè vào ô số 3 (Trang 1) dạng: 1995 年năm 02 月tháng 01 日ngày
                    let formatTrang1 = `${yyyy} 年năm ${mm} 月tháng ${dd} 日ngày`;
                    try { 
                        let f3 = form.getTextField('3'); 
                        if(f3) { f3.setText(formatTrang1); f3.updateAppearances(customFont); } 
                    } catch(e){}

                    // 2. Chẻ 3 mảnh điền vào Trang 3 (Tìm lỗ tên là: 年năm, 月tháng, 日ngày)
                    try{ let fNgay = form.getTextField('日ngày'); if(fNgay){ fNgay.setText(dd); fNgay.updateAppearances(customFont); } } catch(e){}
                    try{ let fThang = form.getTextField('月tháng'); if(fThang){ fThang.setText(mm); fThang.updateAppearances(customFont); } } catch(e){}
                    try{ let fNam = form.getTextField('年năm'); if(fNam){ fNam.setText(yyyy); fNam.updateAppearances(customFont); } } catch(e){}
                }
            } catch(e) {}
        }

        // -----------------------------------------------------
        // BƯỚC C: GỘP & TÁCH LẠI ĐỊA CHỈ (THƯỜNG TRÚ - Ô 18)
        // -----------------------------------------------------
        let addr18 = emp[18] || emp["col18"];
        if(addr18) {
            try {
                let parts = String(addr18).split('|'); // Cắt dấu |
                let tinh = parts[0] || '';
                let phuong = parts[1] || '';
                let chitiet = parts[2] || '';
                
                // Nối lại thành chuỗi đẹp có dấu phẩy
                let fullAddress18 = [chitiet, phuong, tinh].filter(Boolean).join(', ');

                // Kịch bản A: PDF mày chỉ vẽ 1 ô dài tên là '18'
                try { let f18 = form.getTextField('18'); if(f18){ f18.setText(fullAddress18); f18.updateAppearances(customFont); } } catch(e){}

                // Kịch bản B: PDF mày vẽ 3 ô lẻ rải rác
                try { let f18t = form.getTextField('18_tinh'); if(f18t){ f18t.setText(tinh); f18t.updateAppearances(customFont); } } catch(e){}
                try { let f18p = form.getTextField('18_phuong'); if(f18p){ f18p.setText(phuong); f18p.updateAppearances(customFont); } } catch(e){}
                try { let f18c = form.getTextField('18_chitiet'); if(f18c){ f18c.setText(chitiet); f18c.updateAppearances(customFont); } } catch(e){}
            } catch(e) {}
        }

        // -----------------------------------------------------
        // BƯỚC D: LƯU PDF VÀ TẢI XUỐNG MÁY
        // -----------------------------------------------------
        const pdfBytesSaved = await pdfDoc.save();
        const blob = new Blob([pdfBytesSaved], { type: "application/pdf" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        
        let tenNV = (emp[0] || emp["col0"] || "NhanVien").replace(/ /g, "_");
        link.download = `Ho_So_${tenNV}.pdf`;
        link.click();

        status.style.display = "none";

    } catch (error) {
        console.error(error);
        status.innerText = "❌ Lỗi: Không thể tạo file PDF. Hãy đảm bảo mày đã up file 'form.pdf' và 'font.ttf' lên Github!";
    }
}
</script>
</body>
</html>
