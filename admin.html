<!DOCTYPE html>
<html lang="vi"><head><meta charset="UTF-8"><title>XUẤT PDF TỰ ĐỘNG</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/downloadjs/1.4.8/download.min.js"></script>
<style>body{font-family:Arial;background:#f4f7f6}.container{max-width:1200px;background:#fff;padding:20px;margin:auto;}table{width:100%;border-collapse:collapse;margin-top:20px}th,td{border:1px solid #ddd;padding:10px}th{background:#0056b3;color:#fff}.btn{background:#d9534f;color:#fff;border:none;padding:8px;cursor:pointer;font-weight:bold}#status{color:#155724;font-weight:bold;margin-top:15px;background:#fff3cd;padding:15px;display:none;white-space:pre-wrap}</style></head>
<body>
<div class="container"><h2>QUẢN TRỊ XUẤT PDF</h2><div id="status"></div>
<table><thead><tr><th>Họ Tên</th><th>CCCD</th><th>Thao tác</th></tr></thead><tbody id="tableBody"></tbody></table>
</div>
<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxWaVZbc24TCQHZoowqhW9tTEf5gtewczPfLMYrKMqDKLfjT9C3jUPYsQyXdNpCRleA/exec";
let empData = [];

window.onload = async () => {
    try {
        let res = await fetch(SCRIPT_URL); empData = await res.json();
        let html = '';
        empData.slice().reverse().forEach((emp, revIdx) => {
            if(!emp[0]) return; let idx = empData.length - 1 - revIdx;
            html += `<tr><td><b>${emp[0]}</b></td><td>${emp[19]||''}</td><td><button class="btn" onclick="exportPDF(${idx})">📄 XUẤT PDF</button></td></tr>`;
        });
        document.getElementById('tableBody').innerHTML = html;
    } catch(e) {}
};

async function getGasImg(url) {
    if(!url) return null; let match = url.match(/id=([a-zA-Z0-9_-]+)/); if(!match) return null;
    let res = await fetch(SCRIPT_URL+"?action=getImage&id="+match[1]); let json = await res.json();
    if(json.ok){ let bin = window.atob(json.data.split(',')[1]); let b = new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) b[i]=bin.charCodeAt(i); return b.buffer; } return null;
}

function formatSal(v){
    if(!v) return ""; let s = String(v).toUpperCase().trim(); let m = s.replace(/[,.]/g,'').match(/\d+/);
    if(!m) return s; let n = parseInt(m[0],10); let f = n.toLocaleString('vi-VN');
    return (s.includes('USD') || n<100000) ? `${f} USD` : `${f} VND`;
}

async function exportPDF(idx) {
    let emp = empData[idx]; let st = document.getElementById('status'); st.style.display='block'; st.innerHTML=`🔄 Đang xử lý [${emp[0]}]...`;
    try {
        const doc = await PDFLib.PDFDocument.load(await fetch("template.pdf?v="+Date.now()).then(r=>r.arrayBuffer()));
        doc.registerFontkit(window.fontkit);
        const font = await doc.embedFont(await fetch("https://cdnjs.cloudflare.com/ajax/libs/ink/3.1.10/fonts/Roboto/roboto-regular-webfont.ttf").then(r=>r.arrayBuffer()));
        const form = doc.getForm();

        // 1. Điền chữ 
        for(let i=0; i<=44; i++){
            if([4,17,25,26,27,30].includes(i)) continue; // Bỏ qua Checkbox & Cột Học Vấn
            let val = emp[i] ? String(emp[i]) : "";
            if([3,5,20,41].includes(i) && val){ let d=new Date(val); if(!isNaN(d)) val=`${("0"+d.getDate()).slice(-2)}/${("0"+(d.getMonth()+1)).slice(-2)}/${d.getFullYear()}`; }
            if(i===9 || i===12) val = formatSal(val);
            try{ let f=form.getTextField(i.toString()); if(f&&val){ f.setText(val); f.updateAppearances(font); } }catch(e){}
        }

        // 2. Tách Học Vấn (Thời gian | Tên trường)
        [25,26,27,30].forEach(i => {
            if(emp[i]){
                let p = String(emp[i]).split('|');
                try{ form.getTextField(`${i}_thoigian`).setText(p[0]||''); form.getTextField(`${i}_thoigian`).updateAppearances(font); }catch(e){}
                try{ form.getTextField(`${i}_tentruong`).setText(p[1]||''); form.getTextField(`${i}_tentruong`).updateAppearances(font); }catch(e){}
            }
        });

        // 3. Checkbox (Giới tính & Hôn nhân)
        try { let gt=String(emp[4]||'').toLowerCase(); if(gt.includes('nam')) form.getCheckBox('Nam').check(); else if(gt.includes('nữ')||gt.includes('nu')) form.getCheckBox('Nu').check(); }catch(e){}
        try { let hn=String(emp[17]||'').toLowerCase(); if(hn.includes('đã')||hn.includes('da ket')) form.getCheckBox('DaKetHon').check(); else form.getCheckBox('ChuaKetHon').check(); }catch(e){}

        // 4. Đo & Ép ảnh (45 đến 49)
        let imgs = [ {f:'45',u:emp[45]}, {f:'46',u:emp[46]}, {f:'47',u:emp[47]}, {f:'48',u:emp[48]}, {f:'49',u:emp[49]} ];
        let draw = [];
        imgs.forEach(t => { if(t.u) { try{ let field=form.getField(t.f); if(field){ draw.push({r:field.acroField.getWidgets()[0].getRectangle(), u:t.u, p:doc.getPages().findIndex(p=>p.ref===field.acroField.getWidgets()[0].getP())}); } }catch(e){} } });
        
        form.flatten(); // Ép phẳng mặt giấy

        for(let d of draw){
            let b = await getGasImg(d.u);
            if(b){ let img=await doc.embedJpg(b).catch(()=>doc.embedPng(b)); doc.getPages()[d.p].drawImage(img,{x:d.r.x,y:d.r.y,width:d.r.width,height:d.r.height}); }
        }

        download(await doc.save(), `HoSo_${emp[0]}.pdf`, "application/pdf");
        st.innerHTML += `<br>🎉 HOÀN TẤT! Đã tải file.`;
    } catch(e) { st.innerHTML += `<br>❌ Lỗi: ${e.message}`; }
}
</script></body></html>
